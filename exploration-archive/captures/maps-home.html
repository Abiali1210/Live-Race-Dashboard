<script>
    window.getDeviceIdForJitsu = function() {
        let defaultDeviceId = null;
        const storeKey = "HQdevice";

        if(defaultDeviceId){
            sessionStorage.setItem(storeKey, defaultDeviceId);
            return defaultDeviceId;
        } else {
            let deviceId = sessionStorage.getItem(storeKey);
            return deviceId || null;
        }
    }

    window.getSessionIdForJitsu = function() {

        let randomId;
        let defaultSessionId = null;

        if(defaultSessionId){
            randomId = () => defaultSessionId;
        }else{
            randomId = () => Date.now();
                // "s_" + Math.random().toString(36).substring(2) + Math.random().toString(36).substring(2);
        }

        const storeKey = "HQsession";
        let sessionId = sessionStorage.getItem(storeKey);

        if (!sessionId || defaultSessionId) {
            sessionId = randomId();
            sessionStorage.setItem(storeKey, sessionId);
        }

        return sessionId;
    }

    const sessionId = window.getSessionIdForJitsu();
